<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TicketTriage</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<h1>TicketTriage</h1>
<p class="subtitle">Comment submition form.</p>

<div class="layout">

    <div class="card">
        <h2>Submit a comment</h2>
        <form id="comment-form">
            <label for="channel">Channel</label>
            <input id="channel" type="text" placeholder="e.g. app-store-review, email" required>

            <label for="comment">Comment</label>
            <textarea id="comment" placeholder="What did the customer say?" required></textarea>

            <button type="submit" id="submit-btn">Submit</button>
            <div class="status" id="status"></div>
        </form>
    </div>

    <div class="card">
        <h2>
            Tickets
            <button id="refresh-btn" class="refresh-btn">Refresh</button>
        </h2>
        <div id="tickets"></div>
    </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
